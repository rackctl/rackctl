name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
      # Two-layer supply-chain gate. govulncheck is Go-native and
      # reachability-aware (flags only vulnerabilities reachable in the call
      # graph); osv-scanner is the estate-wide OSV-database gate every JS repo
      # runs, here broadening coverage to the whole module graph. Both are pinned
      # for reproducible CI and both fail the build.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./
