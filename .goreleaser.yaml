version: 2
project_name: rackctl

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/rackctl/rackctl/cmd.Version={{ .Version }}

archives:
  - formats: [tar.gz]
    # Must match scripts/install.sh: rackctl_<os>_<arch>.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: rackctl
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://rackctl.com"
    description: "The day-0 installer for a nanohype platform"
    license: "Apache-2.0"
    install: |
      bin.install "rackctl"

release:
  github:
    owner: rackctl
    name: rackctl
