# rackctl full-provision config — AWS, development.
# `rackctl init -c examples/rackctl.yaml` (dry-run) then add --apply.
org:
  name: acme
  gitops:
    eksGitopsRepo: github.com/acme/eks-gitops   # operator's fork of nanohype/eks-gitops
    # clustersRepo/tenantsRepo only needed when controlPlane.eksFleet/portal are true

cloud:
  provider: aws
  accountId: "111111111111"
  region: us-west-2
  profile: workload-development  # AWS SSO profile
  identityCenter:
    manage: true
    adminUser: jane-admin

environment: development         # development | staging | production

cluster:
  name: platform                 # cluster base; the EKS cluster is <environment>-<name> (development-platform). Required, unique per account+env, must != environment
  version: "1.35"
  endpointPublicAccess: true     # prod MUST be false (needs bastion/VPN). landing-zone is private-by-default; rackctl supplies this posture at apply time
  endpointAllowlist: []          # CIDRs allowed to reach the public API endpoint. Empty + public => rackctl auto-detects this host's egress IP as <ip>/32 (never 0.0.0.0/0). Explicit entries win, e.g. [203.0.113.4/32]
  systemNodes:
    instanceTypes: [m7g.xlarge]
    minSize: 2
    maxSize: 6
    desiredSize: 2
  network:
    vpcCidr: 10.0.0.0/16
    natGateways: 1
    # Create-mode levers, all off by default. Day-0 bootstrap is create mode only — the
    # hub mints its own VPC (adopt is a spoke/eks-fleet concern, not rackctl's). These
    # ride TF_VAR_* onto landing-zone's private-by-default network component at apply
    # time, layered over the generic committed tree exactly like the endpoint posture.
    # rackctl validates the combination up front, so a contradiction fails in a second
    # here instead of ~20 minutes into a tofu apply. Uncomment to opt into the org's
    # IPAM / transit-gateway topology:
    #
    # ipamPoolId: ipam-pool-0abc123   # draw the VPC CIDR from an IPAM pool instead of vpcCidr; leave vpcCidr at its default (mutually exclusive with a non-default vpcCidr)
    # ipamNetmaskLength: 18           # netmask of the CIDR carved from the pool, 16–20 (required with ipamPoolId; subnets carve 8 bits smaller, so /20 is the smallest that clears AWS's /28 minimum)
    # transitGatewayId: tgw-0abc123   # attach the VPC to a transit gateway (10.0.0.0/8 → TGW); requires an IPAM-allocated CIDR so prefixes never overlap
    # centralizedEgress: true         # private default route via the TGW to a central egress VPC, zero local NAT gateways; requires transitGatewayId
  ttlDays: 0                      # eks-fleet auto-reap; 0 = persistent

quotas:
  autoRequest: true               # file L-1216C47A (EC2 vCPU) etc. before provisioning
  vcpu: 256

addons:
  observability: true             # managed-monitoring (AMP+AMG)
  druid: false
  accelerators: false             # gpu-operator / neuron

dns:
  hostedZone: acme.example.com

agentPlatform:
  enable: true
  bedrockModelFamilies: [anthropic, amazon-nova]
  compliance:
    soc2: true
    hipaa: false

controlPlane:
  eksFleet: false                 # opt-in: Crossplane cluster control plane
  portal: false                   # opt-in: day-2 operator UI

firstTenant:                      # optional smoke test
  name: blank
  persona: generic
  tenant: example
  monthlyBudgetUsd: 100
